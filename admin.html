<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Admin Panel</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="/styles.css" />
  <style>
    :root {
      --bg: #070707;
      --card: #0f0f0f;
      --muted: #9aa3ad;
      --accent: #0a84ff;
      --success: #16a34a;
      --danger: #ef4444;
      color-scheme: dark;
    }
    body { margin:0; padding:20px; font-family:Inter,system-ui,Segoe UI,Roboto,"Helvetica Neue",Arial; background:var(--bg); color:#e6eef6; }
    h1 { margin:0 0 18px 0; font-size:22px; }
    .row { display:flex; gap:16px; flex-wrap:wrap; }
    .card { background:var(--card); padding:14px; border-radius:10px; box-shadow:0 6px 18px rgba(0,0,0,0.6); min-width:280px; flex:1 1 320px; }
    label { display:block; font-size:13px; color:var(--muted); margin-top:8px; }
    input, textarea, select { width:100%; padding:8px 10px; margin-top:6px; border-radius:8px; border:1px solid rgba(255,255,255,0.04); background:#0b0b0b; color:#e6eef6; box-sizing:border-box; }
    button.btn { margin-top:10px; padding:8px 12px; border-radius:8px; border:none; cursor:pointer; background:var(--accent); color:#fff; }
    button.ghost { background:transparent; border:1px solid rgba(255,255,255,0.06); color:var(--muted); }
    pre { background:#050505; padding:10px; border-radius:8px; overflow:auto; max-height:320px; color:#cfe8ff; }
    .muted { color:var(--muted); font-size:13px; }
    .small { font-size:13px; color:var(--muted); margin-top:6px; }
    .ok { color:var(--success); }
    .err { color:var(--danger); }
    a.link { color:var(--accent); text-decoration:none; }
    .topbar { display:flex; gap:12px; align-items:center; margin-bottom:18px; }
    .topbar a { color:#e6eef6; text-decoration:none; font-size:14px; }
  </style>
</head>
<body>
  <div class="topbar">
    <a class="link" href="/">← Main site</a>
    <a class="link" href="/settings.html">Settings</a>
    <a class="link" href="/ct.html">Critterland</a>
  </div>

  <h1>Admin Panel</h1>

  <div class="row">
    <div class="card" id="auth-card">
      <h3>Admin Authentication</h3>
      <label>Admin Username</label>
      <input id="admin-username" placeholder="Toego58" autocomplete="username" />
      <label>Admin Password</label>
      <input id="admin-password" type="password" autocomplete="current-password" />
      <button id="admin-auth" class="btn">Authenticate</button>
      <div id="admin-auth-msg" class="small muted"></div>
    </div>

    <div class="card hidden" id="tools-card">
      <h3>Admin Utilities</h3>

      <div style="margin-bottom:12px;">
        <button id="list-users" class="btn">List Users</button>
        <div class="small muted">Fetches all keys from KV</div>
      </div>

      <label>Username to delete</label>
      <input id="delete-username" placeholder="username" />
      <button id="delete-user" class="btn ghost">Delete User</button>
      <div id="delete-msg" class="small muted"></div>

      <label style="margin-top:12px;">Set User Password</label>
      <input id="setpass-username" placeholder="username" />
      <input id="setpass-password" type="password" placeholder="new password" />
      <button id="setpass-btn" class="btn ghost">Set Password</button>
      <div id="setpass-msg" class="small muted"></div>
    </div>

    <div class="card">
      <h3>Users Output</h3>
      <pre id="users-list">No data</pre>
    </div>

    <div class="card">
      <h3>Submissions</h3>
      <div class="small muted">Local submissions saved in browser (for testing). Use API to persist to KV if desired.</div>
      <pre id="submissions-list">No submissions</pre>
      <button id="clear-submissions" class="btn ghost">Clear Local Submissions</button>
    </div>
  </div>

  <script>
    // Auto-detect API base
    const API_BASE =
      location.hostname === "127.0.0.1" || location.hostname === "localhost"
        ? "http://127.0.0.1:3000/api"
        : "https://cold-cell-aa07.jkmeiihh.workers.dev/api";

    // Elements
    const adminAuthBtn = document.getElementById("admin-auth");
    const adminMsg = document.getElementById("admin-auth-msg");
    const toolsCard = document.getElementById("tools-card");
    const usersListEl = document.getElementById("users-list");
    const listUsersBtn = document.getElementById("list-users");
    const deleteBtn = document.getElementById("delete-user");
    const deleteMsg = document.getElementById("delete-msg");
    const setpassBtn = document.getElementById("setpass-btn");
    const setpassMsg = document.getElementById("setpass-msg");
    const submissionsList = document.getElementById("submissions-list");
    const clearSubBtn = document.getElementById("clear-submissions");

    // Admin credentials stored in-memory only
    let adminCreds = null;

    function showMsg(el, text, ok = true) {
      el.textContent = text;
      el.className = ok ? "small ok" : "small err";
      setTimeout(() => { el.textContent = ""; el.className = "small muted"; }, 5000);
    }

    adminAuthBtn.addEventListener("click", () => {
      const u = document.getElementById("admin-username").value.trim();
      const p = document.getElementById("admin-password").value;
      if (!u || !p) { adminMsg.textContent = "Enter admin username and password"; return; }
      adminCreds = { adminUsername: u, adminPassword: p };
      adminMsg.textContent = "Authenticated locally. Use tools below.";
      toolsCard.classList.remove("hidden");
      // clear password input for safety
      document.getElementById("admin-password").value = "";
    });

    listUsersBtn.addEventListener("click", async () => {
      if (!adminCreds) return alert("Authenticate first");
      usersListEl.textContent = "Loading...";
      try {
        const res = await fetch(API_BASE + "/admin/list", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(adminCreds)
        });
        const data = await res.json();
        if (!data.success) {
          usersListEl.textContent = JSON.stringify(data, null, 2);
          return;
        }
        usersListEl.textContent = JSON.stringify(data.users, null, 2);
      } catch (e) {
        usersListEl.textContent = "Network error";
      }
    });

    deleteBtn.addEventListener("click", async () => {
      if (!adminCreds) return alert("Authenticate first");
      const username = document.getElementById("delete-username").value.trim();
      if (!username) return showMsg(deleteMsg, "Enter username", false);
      showMsg(deleteMsg, "Deleting...");
      try {
        const res = await fetch(API_BASE + "/admin/delete", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ ...adminCreds, username })
        });
        const data = await res.json();
        showMsg(deleteMsg, data.message || JSON.stringify(data), data.success);
      } catch (e) {
        showMsg(deleteMsg, "Network error", false);
      }
    });

    setpassBtn.addEventListener("click", async () => {
      if (!adminCreds) return alert("Authenticate first");
      const username = document.getElementById("setpass-username").value.trim();
      const newPassword = document.getElementById("setpass-password").value;
      if (!username || !newPassword) return showMsg(setpassMsg, "Enter username and new password", false);
      showMsg(setpassMsg, "Updating...");
      try {
        const res = await fetch(API_BASE + "/admin/setpass", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ ...adminCreds, username, newPassword })
        });
        const data = await res.json();
        showMsg(setpassMsg, data.message || JSON.stringify(data), data.success);
      } catch (e) {
        showMsg(setpassMsg, "Network error", false);
      }
    });

    // Local submissions viewer (for the sample form)
    function loadLocalSubmissions() {
      const subs = JSON.parse(localStorage.getItem("submissions") || "[]");
      if (!subs.length) submissionsList.textContent = "No submissions";
      else submissionsList.textContent = JSON.stringify(subs, null, 2);
    }
    clearSubBtn.addEventListener("click", () => {
      localStorage.removeItem("submissions");
      loadLocalSubmissions();
    });

    // Initialize
    loadLocalSubmissions();
  </script>
</body>
</html>
