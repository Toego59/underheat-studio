<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback — UNDERHEAT Studio</title>

  <link rel="stylesheet" href="/style.css">

  <!-- Auth0 SDK (official) -->
  <script src="https://cdn.auth0.com/js/auth0-spa-js/2.18/auth0-spa-js.production.js"></script>

  <style>
    .feedback-section { margin-bottom: 2rem; }
    .form-group { margin-bottom: 1rem; }
    label { display: block; font-size: 0.9rem; margin-bottom: 0.5rem; }
    input[type="text"], input[type="email"], textarea, select { width: 100%; padding: 0.5rem; }
    .btn-row { display: flex; gap: 0.5rem; margin-top: 1rem; }
  </style>
</head>

<body>

<header class="topbar">
  <button id="back-btn" class="left">← Back</button>
  <button id="logout-btn" class="right">Logout</button>
</header>

<main class="main">

  <!-- PUBLIC FEEDBACK FORM -->
  <section class="panel feedback-section">
    <h2>Share Feedback</h2>
    <p class="small muted">Post to the community wall (optional file attachment)</p>

    <div class="form-group">
      <label for="pub-author">Name (optional)</label>
      <input id="pub-author" type="text" placeholder="Your name">
    </div>

    <div class="form-group">
      <label for="pub-message">Message</label>
      <textarea id="pub-message" placeholder="Share your thoughts..."></textarea>
    </div>

    <div class="form-group">
      <label for="pub-image">Attach File (optional)</label>
      <input id="pub-image" type="file" accept="image/*">
    </div>

    <div class="form-group">
      <label>
        <input type="checkbox" id="pub-anonymous">
        Post anonymously
      </label>
    </div>

    <div class="btn-row">
      <button id="pub-submit" class="btn primary">Post to Wall</button>
    </div>
    <p id="pub-status" class="small muted"></p>
  </section>

  <!-- COMMUNITY WALL -->
  <section class="panel feedback-section">
    <h2>Community Wall</h2>
    <div id="pub-list"></div>
  </section>

  <!-- PRIVATE FEEDBACK FORM -->
  <section class="panel feedback-section">
    <h2>Private Feedback</h2>
    <p class="small muted">Only visible to founder & admins</p>

    <div class="form-group">
      <label for="fb-name">Name (optional)</label>
      <input id="fb-name" type="text" placeholder="Your name">
    </div>

    <div class="form-group">
      <label for="fb-email">Email (optional)</label>
      <input id="fb-email" type="email" placeholder="Your email">
    </div>

    <div class="form-group">
      <label for="fb-type">Feedback Type</label>
      <select id="fb-type">
        <option>General Feedback</option>
        <option>Bug Report</option>
        <option>Feature Request</option>
      </select>
    </div>

    <div class="form-group">
      <label for="fb-message">Message</label>
      <textarea id="fb-message" placeholder="Tell us what you think..."></textarea>
    </div>

    <div class="btn-row">
      <button id="fb-submit" class="btn primary">Submit Private Feedback</button>
    </div>
    <p id="fb-status" class="small muted"></p>
  </section>

  <!-- ADMIN NOTES (founder/admin only) -->
  <section class="panel feedback-section hidden" id="admin-section">
    <h2>Admin Notes</h2>
    <p class="small muted">Internal notes visible only to admins</p>

    <div class="form-group">
      <label for="admin-message">Note</label>
      <textarea id="admin-message" placeholder="Internal note..."></textarea>
    </div>

    <div class="btn-row">
      <button id="admin-submit" class="btn primary">Post Note</button>
    </div>
    <p id="admin-status" class="small muted"></p>
    <div id="admin-list"></div>
  </section>

</main>

<!-- FEEDBACK LOGIC -->
<script src="/feedback.js"></script>

<!-- AUTH0 LOGOUT HANDLER -->
<script>
  document.addEventListener("DOMContentLoaded", async () => {
    const logoutBtn = document.getElementById("logout-btn");
    const backBtn = document.getElementById("back-btn");

    const auth0Client = await auth0.createAuth0Client({
      domain: "dev-4ltdfgozv6ve68zm.us.auth0.com",
      clientId: "nq6P9QVnA0WT2GCls7JNl5Unj35l8oGz",
      authorizationParams: {
        redirect_uri: "https://miniature-system-q7p4wgx7g96g2r95-5500.app.github.dev"
      }
    });

    logoutBtn.addEventListener("click", () => {
      auth0Client.logout({
        logoutParams: {
          returnTo: "https://miniature-system-q7p4wgx7g96g2r95-5500.app.github.dev"
        }
      });
    });

    backBtn.addEventListener("click", () => {
      window.location.href = "/index.html";
    });
  });
</script>

</body>
</html>
