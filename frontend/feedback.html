<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback — UNDERHEAT Studio</title>

  <link rel="stylesheet" href="style.css">
  <script src="theme.js"></script>
</head>

<body>
  <div class="page">

    <!-- HEADER -->
    <header class="header">
      <div class="logo-container">
        <img src="assets/logo.png" class="logo" alt="UNDERHEAT">
      </div>

      <nav class="nav">
        <button class="btn ghost" onclick="location.href='index.html'">← Back</button>
      </nav>
    </header>

    <!-- MAIN -->
    <main class="main">

      <section class="panel">
        <h2>Feedback</h2>
        <p class="small muted">Tell us what you think — bugs, ideas, anything.</p>

        <!-- NAME -->
        <div class="form-group">
          <label for="fb-name">Your Name (optional)</label>
          <input id="fb-name" type="text" placeholder="Name">
        </div>

        <!-- EMAIL -->
        <div class="form-group">
          <label for="fb-email">Your Email (optional)</label>
          <input id="fb-email" type="email" placeholder="Email">
        </div>

        <!-- TYPE -->
        <div class="form-group">
          <label for="fb-type">Type</label>
          <select id="fb-type">
            <option value="General Feedback">General Feedback</option>
            <option value="Bug Report">Bug Report</option>
            <option value="Feature Request">Feature Request</option>
          </select>
        </div>

        <!-- MESSAGE -->
        <div class="form-group">
          <label for="fb-message">Message</label>
          <textarea id="fb-message" rows="5" placeholder="Write your message..."></textarea>
        </div>

        <!-- ACTIONS -->
        <button id="fb-submit" class="btn primary" style="margin-top: 12px;">Submit Feedback</button>

        <!-- STATUS -->
        <p id="fb-status" class="small" style="margin-top: 10px;"></p>
      </section>

    </main>

    <!-- FOOTER -->
    <footer class="footer">
      <p>© 2026 UNDERHEAT Studio</p>
    </footer>

  </div>

  <script src="feedback.js"></script>
</body>
</html>
