<!DOCTYPE html>
<html>
<head>
  <title>Feedback — UNDERHEAT Studio</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<header class="topbar">
  <button id="logout-btn" class="right">Logout</button>
</header>

<main class="main">

  <!-- PRIVATE FEEDBACK -->
  <section class="panel">
    <h2>Private Feedback</h2>
    <p class="small muted">Only visible to founder & admins.</p>

    <input id="fb-name" placeholder="Your name (optional)">
    <input id="fb-email" placeholder="Your email (optional)">
    <select id="fb-type">
      <option>General Feedback</option>
      <option>Bug Report</option>
      <option>Feature Request</option>
    </select>
    <textarea id="fb-message" placeholder="Write your message..."></textarea>

    <button id="fb-submit">Submit Private Feedback</button>
    <p id="fb-status"></p>
  </section>

  <!-- PUBLIC POSTS -->
  <section class="panel">
    <h2>Community Wall</h2>

    <input id="pub-author" placeholder="Name (optional)">
    <textarea id="pub-message" placeholder="Share something..."></textarea>
    <input id="pub-image" type="file" accept="image/*">

    <label>
      <input type="checkbox" id="pub-sensitive">
      Post anonymously
    </label>

    <button id="pub-submit">Post</button>
    <p id="pub-status"></p>

    <div id="pub-list"></div>
  </section>

  <!-- ADMIN NOTES -->
  <section class="panel hidden" id="admin-section">
    <h2>Admin Notes</h2>
    <textarea id="admin-message" placeholder="Internal note..."></textarea>
    <button id="admin-submit">Post Note</button>
    <p id="admin-status"></p>
    <div id="admin-list"></div>
  </section>

</main>

<script src="/feedback.js"></script>
</body>
</html>
