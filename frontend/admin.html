<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel — UNDERHEAT Studio</title>

  <link rel="stylesheet" href="style.css">
  <script src="theme.js"></script>
</head>

<body>
  <div class="page">

    <!-- HEADER -->
    <header class="header">
      <div class="logo-container">
        <img src="assets/logo.png" class="logo" alt="UNDERHEAT">
      </div>

      <nav class="nav">
        <button class="btn ghost" onclick="location.href='index.html'">← Back</button>
      </nav>
    </header>

    <!-- MAIN -->
    <main class="main">

      <section class="panel">
        <h2>Admin Panel</h2>
        <p class="small muted">Founder & Admin access only</p>

        <!-- Status / Errors -->
        <div id="admin-status" class="panel small" style="margin-top: 10px;"></div>

        <!-- User List -->
        <h3 style="margin-top: 20px;">User Management</h3>
        <div id="admin-user-list" class="admin-user-list"></div>
      </section>

    </main>

    <!-- FOOTER -->
    <footer class="footer">
      <p>© 2026 UNDERHEAT Studio</p>
    </footer>

  </div>

  <script src="admin.js"></script>
</body>
</html>
