<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel — UNDERHEAT Studio</title>

  <link rel="stylesheet" href="style.css?v=1776870060">
  <script src="theme.js"></script>
</head>
<body>
  <div class="page">

    <!-- HEADER -->
    <header class="header">
      <div class="logo-container">
        <img src="assets/logo.png" class="logo" alt="UNDERHEAT">
      </div>

      <nav class="nav">
        <button class="btn ghost" onclick="location.href='index.html'">← Back</button>
      </nav>
    </header>

    <!-- MAIN -->
    <main class="main">

      <section class="panel">
        <h2>Admin Panel</h2>
        <p class="small">Restricted area — admin accounts only.</p>

        <!-- ADMIN CONTENT -->
        <div id="admin-content" class="hidden">

          <!-- USER ROLE MANAGER -->
          <section class="panel" style="margin-top:20px;">
            <h3>User Role Manager</h3>
            <p class="small">Promote or demote users.</p>

            <label>Username</label>
            <input id="role-username" type="text" placeholder="Enter username">

            <div style="margin-top:10px;">
              <button id="promote-admin" class="btn secondary">Promote to Admin</button>
              <button id="demote-user" class="btn ghost">Demote to User</button>
            </div>

            <p id="role-message" class="small" style="margin-top:10px;"></p>
          </section>

          <!-- FEEDBACK VIEWER -->
          <section class="panel" style="margin-top:20px;">
            <h3>Feedback Submissions</h3>
            <p class="small">Encrypted feedback — emails are never stored.</p>

            <div id="feedback-list" style="margin-top:10px;"></div>

            <button id="clear-feedback" class="btn danger" style="margin-top:12px;">
              Clear All Feedback
            </button>
          </section>

        </div>

        <!-- WARNING -->
        <div id="admin-warning" class="hidden">
          <p>You do not have permission to view this page.</p>
        </div>
      </section>

    </main>

    <!-- FOOTER -->
    <footer class="footer">
      <p>© 2026 UNDERHEAT Studio</p>
    </footer>

  </div>

  <!-- ADMIN LOGIC -->
  <script>
    const currentUser = JSON.parse(localStorage.getItem("currentUser") || "null");
    const users = JSON.parse(localStorage.getItem("users") || "{}");

    const adminContent = document.getElementById("admin-content");
    const adminWarning = document.getElementById("admin-warning");

    // ACCESS CONTROL
    if (currentUser && currentUser.role === "admin") {
      adminContent.classList.remove("hidden");
    } else {
      adminWarning.classList.remove("hidden");
    }

    // ROLE MANAGER
    const roleInput = document.getElementById("role-username");
    const roleMessage = document.getElementById("role-message");

    document.getElementById("promote-admin").onclick = () => {
      const name = roleInput.value.trim();
      if (!users[name]) {
        roleMessage.textContent = "User not found.";
        return;
      }
      users[name].role = "admin";
      localStorage.setItem("users", JSON.stringify(users));
      roleMessage.textContent = `${name} is now an admin.`;
    };

    document.getElementById("demote-user").onclick = () => {
      const name = roleInput.value.trim();
      if (!users[name]) {
        roleMessage.textContent = "User not found.";
        return;
      }
      users[name].role = "user";
      localStorage.setItem("users", JSON.stringify(users));
      roleMessage.textContent = `${name} is now a normal user.`;
    };

    // ============================================================
    // FEEDBACK VIEWER — DECRYPT ENTRIES
    // ============================================================

    const feedbackList = document.getElementById("feedback-list");
    let feedback = JSON.parse(localStorage.getItem("feedback") || "[]");

    async function getKey() {
      let keyData = localStorage.getItem("fb-key");
      if (!keyData) return null;

      const raw = Uint8Array.from(atob(keyData), c => c.charCodeAt(0));
      return crypto.subtle.importKey("raw", raw, "AES-GCM", true, ["encrypt", "decrypt"]);
    }

    async function decryptEntry(entry) {
      try {
        const key = await getKey();
        if (!key) return null;

        const iv = Uint8Array.from(atob(entry.iv), c => c.charCodeAt(0));
        const data = Uint8Array.from(atob(entry.data), c => c.charCodeAt(0));

        const decrypted = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv },
          key,
          data
        );

        return JSON.parse(new TextDecoder().decode(decrypted));
      } catch (err) {
        return null;
      }
    }

    async function renderFeedback() {
      if (feedback.length === 0) {
        feedbackList.innerHTML = "<p class='small'>No feedback submitted yet.</p>";
        return;
      }

      let html = "";

      for (let i = 0; i < feedback.length; i++) {
        const decrypted = await decryptEntry(feedback[i]);
        if (!decrypted) continue;

        html += `
          <div class="panel" style="margin-bottom:10px;">
            <p><strong>${decrypted.name || "Anonymous"}</strong></p>
            <p>${decrypted.message}</p>
            <p class="small">
              ${decrypted.type} • ${decrypted.time || ""} • ${decrypted.verified ? "Verified" : ""}
            </p>
            <button class="btn ghost" onclick="window._deleteFeedback(${i})">Delete</button>
          </div>
        `;
      }

      feedbackList.innerHTML = html;
    }

    window._deleteFeedback = function (idx) {
      feedback.splice(idx, 1);
      localStorage.setItem("feedback", JSON.stringify(feedback));
      renderFeedback();
    };

    renderFeedback();

    document.getElementById("clear-feedback").onclick = () => {
      localStorage.removeItem("feedback");
      feedback = [];
      feedbackList.innerHTML = "<p class='small'>All feedback cleared.</p>";
    };
  </script>

</body>
</html>
