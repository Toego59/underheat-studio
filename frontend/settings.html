<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings — UNDERHEAT Studio</title>

  <link rel="stylesheet" href="style.css">
  <script src="theme.js"></script>
</head>

<body>
  <div class="page">

    <!-- HEADER -->
    <header class="header">
      <div class="logo-container">
        <img src="assets/logo.png" class="logo" alt="UNDERHEAT">
      </div>

      <nav class="nav">
        <button class="btn ghost" onclick="location.href='index.html'">← Back</button>
      </nav>
    </header>

    <!-- MAIN -->
    <main class="main">

      <section class="panel">
        <h2>Site Customization</h2>
        <p class="small muted">Your theme applies across the entire site</p>

        <!-- COLOR SETTINGS -->
        <h3 class="section-title">Colors</h3>

        <div class="form-group">
          <label for="accent-color">Accent Color</label>
          <input type="color" id="accent-color">
        </div>

        <div class="form-group">
          <label for="background-color">Background Color</label>
          <input type="color" id="background-color">
        </div>

        <div class="form-group">
          <label for="text-color">Text Color</label>
          <input type="color" id="text-color">
        </div>

        <!-- CARD STYLE -->
        <h3 class="section-title">Card Style</h3>

        <div class="form-group">
          <label for="card-style">Choose Card Style</label>
          <select id="card-style">
            <option value="default">Default</option>
            <option value="solid">Solid</option>
            <option value="rounded">Rounded</option>
          </select>
        </div>

        <!-- FONT STYLE -->
        <h3 class="section-title">Font Style</h3>

        <div class="form-group">
          <label for="font-style">Choose Font Style</label>
          <select id="font-style">
            <option value="modern">Modern (Inter)</option>
            <option value="retro">Retro (Courier)</option>
            <option value="serif">Serif (Georgia)</option>
          </select>
        </div>

        <!-- UI SCALE -->
        <h3 class="section-title">UI Scale</h3>

        <div class="form-group">
          <label for="ui-scale">Scale (0.8 – 1.4)</label>
          <input type="range" id="ui-scale" min="0.8" max="1.4" step="0.01">
        </div>

        <!-- PREVIEW -->
        <h3 class="section-title">Preview</h3>
        <div id="preview-box"></div>

        <!-- ACTIONS -->
        <div style="margin-top: 20px; display: flex; gap: 10px;">
          <button id="save-settings" class="btn primary">Save Settings</button>
          <button id="reset-settings" class="btn ghost">Reset to Default</button>
        </div>

      </section>

    </main>

    <!-- FOOTER -->
    <footer class="footer">
      <p>© 2026 UNDERHEAT Studio</p>
    </footer>

  </div>

  <script src="settings.js"></script>
</body>
</html>
