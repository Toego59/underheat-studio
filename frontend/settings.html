<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings — UNDERHEAT Studio</title>

  <link rel="stylesheet" href="style.css">
  <script src="theme.js"></script>
  <style>
    .color-setting {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 1.5rem;
    }
    .color-setting input[type="color"] {
      margin: 0;
      width: auto;
      min-width: 80px;
      height: 50px;
    }
    .color-label {
      flex: 1;
      min-width: 150px;
    }
    .color-preview {
      width: 60px;
      height: 40px;
      border-radius: 6px;
      border: 2px solid var(--border-color);
    }
  </style>
</head>

<body>
  <div class="page">

    <!-- HEADER -->
    <header class="header">
      <div class="logo-container">
        <img src="assets/logo.png" class="logo" alt="UNDERHEAT">
      </div>

      <nav class="nav">
        <button id="back-btn" class="btn ghost">← Back</button>
        <button id="logout-btn" class="btn ghost">Logout</button>
      </nav>
    </header>

    <!-- MAIN -->
    <main class="main">

      <section class="panel">
        <h2>Site Customization</h2>
        <p class="small muted">Your theme applies across the entire site</p>

        <!-- COLOR SETTINGS -->
        <h3 class="section-title">Colors</h3>

        <div class="color-setting">
          <label class="color-label" for="primary-color">Primary Color</label>
          <input type="color" id="primary-color">
          <div class="color-preview" id="primary-preview"></div>
        </div>

        <div class="color-setting">
          <label class="color-label" for="secondary-color">Secondary Color</label>
          <input type="color" id="secondary-color">
          <div class="color-preview" id="secondary-preview"></div>
        </div>

        <div class="color-setting">
          <label class="color-label" for="accent-color">Accent Color</label>
          <input type="color" id="accent-color">
          <div class="color-preview" id="accent-preview"></div>
        </div>

        <div class="color-setting">
          <label class="color-label" for="background-color">Background Color</label>
          <input type="color" id="background-color">
          <div class="color-preview" id="background-preview"></div>
        </div>

        <div class="color-setting">
          <label class="color-label" for="neon-color">Neon Color</label>
          <input type="color" id="neon-color">
          <div class="color-preview" id="neon-preview"></div>
        </div>

        <!-- CARD STYLE -->
        <h3 class="section-title">Card Style</h3>

        <div class="form-group">
          <label for="card-style">Choose Card Style</label>
          <select id="card-style">
            <option value="glass">Glass</option>
            <option value="solid">Solid</option>
            <option value="outline">Outline</option>
          </select>
        </div>

        <!-- FONT STYLE -->
        <h3 class="section-title">Font Style</h3>

        <div class="form-group">
          <label for="font-style">Choose Font Style</label>
          <select id="font-style">
            <option value="modern">Modern</option>
            <option value="classic">Classic</option>
            <option value="mono">Monospace</option>
          </select>
        </div>

        <!-- UI SCALE -->
        <h3 class="section-title">UI Scale</h3>

        <div class="form-group">
          <label for="ui-scale">Scale (0.8 – 1.4)</label>
          <input type="range" id="ui-scale" min="0.8" max="1.4" step="0.01" value="1">
          <small id="scale-label">100%</small>
        </div>

        <!-- ACTIONS -->
        <div style="margin-top: 20px; display: flex; gap: 10px;">
          <button id="save-settings" class="btn primary">Save Settings</button>
          <button id="reset-settings" class="btn ghost">Reset to Default</button>
        </div>

      </section>

    </main>

    <!-- FOOTER -->
    <footer class="footer">
      <p>© 2026 UNDERHEAT Studio</p>
    </footer>

  </div>

  <script src="settings.js"></script>
</body>
</html>
